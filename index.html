<!DOCTYPE html>
<html>
<head>
<title>Shopkeeper Glove Helper</title>

<style>

body{
font-family:Arial;
text-align:center;
color:white;
margin:0;
background:
repeating-linear-gradient(
45deg,
#2b2b2b,
#2b2b2b 20px,
#303030 20px,
#303030 40px
);
}

.container{
background:#3a3a3a;
width:380px;
margin:auto;
margin-top:70px;
padding:25px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,0.6);
}

input{
padding:10px;
margin:6px;
width:90%;
border:none;
border-radius:6px;
font-size:14px;
}

button{
padding:10px 16px;
margin:6px;
background:#4CAF50;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

button:hover{
background:#43a047;
}

#result{
margin-top:15px;
font-size:22px;
font-weight:bold;
}

#money{
margin-top:10px;
font-size:18px;
color:#00d4ff;
}

</style>

</head>

<body>

<h1>Shopkeeper Glove Helper</h1>

<div class="container">

<input id="day" type="number" placeholder="Day (1-5)" min="1" max="5">

<input id="glove" placeholder="Glove name">

<input id="rating" type="number" placeholder="Rating (1-10)" min="1" max="10">

<input id="price" type="number" placeholder="Price">

<input id="profit" type="number" placeholder="Profit">

<input id="profitColor" placeholder="Profit Colour (green / yellow)">

<br>

<button onclick="check()">Check</button>
<button onclick="nextDay()">Next Day ></button>
<button onclick="clearInputs()">Clear</button>

<p id="result"></p>
<p id="money"></p>

<p>Goal: $3000</p>

</div>

<script>

function check(){

let day = parseInt(document.getElementById("day").value);
let glove = document.getElementById("glove").value.toLowerCase();
let profit = parseFloat(document.getElementById("profit").value);
let profitColor = document.getElementById("profitColor").value.toLowerCase();

if(profit < 0){
profit = 0;
}

let banned = [
"l.o.l.b.o.m.b",
"lol bomb",
"bob",
"plague",
"sbeve",
"ufo",
"bubble",
"lamp",
"overkill"
];

let result = document.getElementById("result");
let money = document.getElementById("money");

/* calculate 11.5% reward */

let reward = profit * 0.115;
reward = reward.toFixed(2);

money.innerHTML = "Money you will receive: $" + reward;

/* banned glove rule */

if(banned.includes(glove)){

if(day >=1 && day <=4){
result.innerHTML = "BAD (Do NOT buy Day 1-4)";
result.style.color = "yellow";
return;
}

if(day == 5){
result.innerHTML = "AMAZING (Buy on Day 5)";
result.style.color = "lime";
return;
}

}

/* profit color rule */

if(profitColor === "green"){
result.innerHTML = "GOOD DEAL";
result.style.color = "lime";
}
else if(profitColor === "yellow"){
result.innerHTML = "BAD DEAL";
result.style.color = "yellow";
}
else{
result.innerHTML = "Type profit colour: green or yellow";
result.style.color = "white";
}

}

function nextDay(){

let dayInput = document.getElementById("day");
let day = parseInt(dayInput.value) || 0;

if(day < 5){
dayInput.value = day + 1;
}

}

function clearInputs(){

document.getElementById("day").value = "";
document.getElementById("glove").value = "";
document.getElementById("rating").value = "";
document.getElementById("price").value = "";
document.getElementById("profit").value = "";
document.getElementById("profitColor").value = "";

document.getElementById("result").innerHTML = "";
document.getElementById("money").innerHTML = "";

}

</script>

</body>
</html>
