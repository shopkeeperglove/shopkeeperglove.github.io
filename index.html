<!DOCTYPE html>
<html>
<head>
<title>Shopkeeper Glove Helper</title>

<style>

body{
font-family:Arial;
text-align:center;
color:white;
margin:0;
background:
repeating-linear-gradient(
45deg,
#2b2b2b,
#2b2b2b 20px,
#303030 20px,
#303030 40px
);
overflow-x:hidden;
}

.container{
background:#3a3a3a;
width:380px;
margin:auto;
margin-top:70px;
padding:25px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,0.6);
position:relative;
z-index:2;
}

input{
padding:10px;
margin:6px;
width:90%;
border:none;
border-radius:6px;
font-size:14px;
}

button{
padding:10px 16px;
margin:6px;
background:#4CAF50;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

button:hover{
background:#43a047;
}

#result{
margin-top:15px;
font-size:22px;
font-weight:bold;
}

#money{
margin-top:10px;
font-size:18px;
color:#00d4ff;
}

/* bottom alert */

.bottomAlert{
position:fixed;
bottom:-120px;
left:0;
width:100%;
padding:25px;
text-align:center;
font-size:22px;
font-weight:bold;
color:white;
border-top-left-radius:40px;
border-top-right-radius:40px;
transition:bottom 0.6s ease, opacity 0.6s ease;
opacity:0;
z-index:5;
}

.bottomAlert.show{
bottom:0;
opacity:1;
}

.goodAlert{
background:#1db954;
}

.badAlert{
background:#e53935;
}

/* floating gloves */

.floatingGlove{
position:fixed;
bottom:-60px;
font-size:35px;
opacity:0.15;
animation:floatUp linear infinite;
pointer-events:none;
z-index:1;
}

@keyframes floatUp{

0%{
transform:translateY(0);
opacity:0;
}

10%{
opacity:0.15;
}

100%{
transform:translateY(-110vh);
opacity:0;
}

}

</style>

</head>

<body>

<!-- MUSIC -->
<audio id="bgMusic" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_4fcb0bdf6c.mp3" type="audio/mpeg">
</audio>

<h1>Shopkeeper Glove Helper</h1>

<div class="container">

<input id="day" type="number" placeholder="Day (1-5)" min="1" max="5">

<input id="glove" placeholder="Glove name">

<input id="rating" type="number" placeholder="Rating (1-10)" min="1" max="10">

<input id="price" type="number" placeholder="Price">

<input id="profit" type="number" placeholder="Profit">

<input id="profitColor" placeholder="Profit Colour (green / yellow)">

<br>

<button onclick="check()">Check</button>
<button onclick="nextDay()">Next Day ></button>
<button onclick="clearInputs()">Clear</button>
<button onclick="playMusic()">Play Music</button>

<p id="result"></p>
<p id="money"></p>

<p>Goal: $3000</p>

</div>

<div id="alertBar" class="bottomAlert"></div>

<script>

/* play music */

function playMusic(){
document.getElementById("bgMusic").play();
}

/* floating gloves */

function spawnGlove(){

let glove = document.createElement("div");

glove.innerHTML = "🧤";
glove.className = "floatingGlove";

glove.style.left = Math.random()*100 + "vw";

glove.style.animationDuration = (6 + Math.random()*6) + "s";

document.body.appendChild(glove);

setTimeout(()=>{
glove.remove();
},12000);

}

setInterval(spawnGlove,1200);

/* alert animation */

function showAlert(text,type){

let bar = document.getElementById("alertBar");

bar.innerHTML = text;

bar.classList.remove("goodAlert","badAlert");

if(type === "good"){
bar.classList.add("goodAlert");
}
else{
bar.classList.add("badAlert");
}

bar.classList.add("show");

setTimeout(()=>{
bar.classList.remove("show");
},2500);

}

/* main checker */

function check(){

let day = parseInt(document.getElementById("day").value);
let glove = document.getElementById("glove").value.toLowerCase();
let profit = parseFloat(document.getElementById("profit").value);
let profitColor = document.getElementById("profitColor").value.toLowerCase();

if(profit < 0){
profit = 0;
}

let banned = [
"l.o.l.b.o.m.b",
"lol bomb",
"bob",
"plague",
"sbeve",
"ufo",
"bubble",
"lamp",
"overkill"
];

let result = document.getElementById("result");
let money = document.getElementById("money");

/* reward calculation (16%) */

let reward = profit * 0.16;
reward = reward.toFixed(2);

money.innerHTML = "Money you will receive: $" + reward;

/* banned glove rule */

if(banned.includes(glove)){

if(day >=1 && day <=4){
result.innerHTML = "BAD (Do NOT buy Day 1-4)";
result.style.color = "yellow";
showAlert("DO NOT BUY THIS GLOVE","bad");
return;
}

if(day == 5){
result.innerHTML = "AMAZING (Buy on Day 5)";
result.style.color = "lime";
showAlert("AMAZING BUY","good");
return;
}

}

/* profit color rule */

if(profitColor === "green"){
result.innerHTML = "GOOD DEAL";
result.style.color = "lime";
showAlert("GOOD DEAL","good");
}
else if(profitColor === "yellow"){
result.innerHTML = "BAD DEAL";
result.style.color = "yellow";
showAlert("BAD DEAL","bad");
}
else{
result.innerHTML = "Type profit colour: green or yellow";
result.style.color = "white";
}

}

/* next day */

function nextDay(){

let dayInput = document.getElementById("day");
let day = parseInt(dayInput.value) || 0;

if(day < 5){
dayInput.value = day + 1;
}

}

/* clear inputs */

function clearInputs(){

document.getElementById("day").value = "";
document.getElementById("glove").value = "";
document.getElementById("rating").value = "";
document.getElementById("price").value = "";
document.getElementById("profit").value = "";
document.getElementById("profitColor").value = "";

document.getElementById("result").innerHTML = "";
document.getElementById("money").innerHTML = "";

}

</script>

</body>
</html>
